<!DOCTYPE html>
<html lang="it">
<head>

  <link rel="stylesheet" href="popup.css">
</head>

      <img src="icons/icon-48.png" alt="Perplexity" class="logo">

  </div>

  <script src="popup.js"></script>
</body>
</html>
